<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=
    , initial-scale=1.0">
    <title>FORMS IN HTML</title>
</head>
<body>
    <h2>REGESTRATION FORM</h2>
    <FORM>
    <label for="">ENTER THE NAME:</label> 
    <input type="text"  required>
     <br><br>
     <label for="">AGE:</label>
     <input type="number" required>
    <br><br>
    <label for="">Email:</label>
    <input type="email" required>
    <br><br>
    <label for="">Date Of Birth:</label>
    <input type="date">
    <br><br>
    <label for="">create password:</label>
    <input type="password" minlength="8" maxlength="8">
    <br><br>
    <label for="">SELECT THE STREAM OPTION :</label>
        <input type="radio" name="STREAM" checked>PCM
        <input type="radio" name="STREAM">PCB
        <input type="radio" name="STREAM">COMMERCE
        <input type="radio" name="STREAM">ARTS
        <br><br>
        <label for="">SELECT THE PAYMENT METHOD</label>
        <select name="payment" id="UPI">
            <option value=""></option>
            <option value="upi">upi</option>
            <option value="phonep">phonep</option>
            <option value="Gpay">Gpay</option>
            <option value="amazonp">amazonp</option>
        </select>
        <br><br>
        <label for="">Please Give a Feedback:</label>
        <textarea name="" id="" placeholder="PLEASE GIVE A FEEDBACK"></textarea>
        <br><br>
        <input type="reset">
        <input type="submit">

</FORM>
</body>
</html>
